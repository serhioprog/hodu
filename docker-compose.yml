services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hodu_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"   # Bug #6: bind only to loopback (was 5432:5432 = all interfaces)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  scraper:
    build: .
    container_name: hodu_scraper
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TZ=Europe/Athens
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EXTERNAL_API_BASE_URL=${EXTERNAL_API_BASE_URL:-}
      - EXTERNAL_API_KEY=${EXTERNAL_API_KEY:-}
      - CSRF_SECRET=${CSRF_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - APP_URL=${APP_URL:-http://localhost:8000}
    # Bug #52: --reload is an intentional DEVELOPMENT convenience here —
    # uvicorn watches ./src bind mount and restarts on file changes.
    # For production deploys remove --reload and use multiple --workers
    # (note: APScheduler in scheduler.py is process-singleton; bug #48
    # tracks the future need to move scheduler to its own container or
    # use a DB-backed job store when workers > 1).
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs                                # Bug #7: persist scraper logs across restarts
      - playwright_cache:/root/.cache/ms-playwright     # Bug #8: cache Chromium binaries (~150MB)
    healthcheck:                                        # Bug #63: container-level liveness
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  playwright_cache:    # Bug #8: named volume for Playwright Chromium binaries